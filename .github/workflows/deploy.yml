name: Continuous Deployment

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Server
    runs-on: self-hosted 
    
    steps:
      - name: Pull latest code and restart containers
        run: |
          cd /home/ktpgeorgia/uga-ktp-website
          
          git fetch origin main
          git reset --hard origin/main

          docker compose build 

          docker compose up -d


          docker image prune -f

      - name: Notify Discord (success)
        if: success()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sf -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK_URL" -d "{
            \"embeds\": [{
              \"title\": \"✅ website deployed\",
              \"color\": 3066993,
              \"url\": \"$RUN_URL\",
              \"fields\": [
                {\"name\": \"Branch\", \"value\": \"$BRANCH\", \"inline\": true},
                {\"name\": \"Commit\", \"value\": \"${SHA:0:7}\", \"inline\": true}
              ]
            }]
          }"

      - name: Notify Discord (failure)
        if: failure()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sf -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK_URL" -d "{
            \"embeds\": [{
              \"title\": \"❌ website deploy FAILED\",
              \"color\": 15158332,
              \"url\": \"$RUN_URL\",
              \"fields\": [
                {\"name\": \"Branch\", \"value\": \"$BRANCH\", \"inline\": true},
                {\"name\": \"Commit\", \"value\": \"${SHA:0:7}\", \"inline\": true}
              ]
            }]
          }"
