services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # this stuff can be overridden with .env if u want
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://ugaktp.com}
        NEXT_PUBLIC_SANITY_PROJECT_ID: ${NEXT_PUBLIC_SANITY_PROJECT_ID:-7qe12arj}
        NEXT_PUBLIC_SANITY_DATASET: ${NEXT_PUBLIC_SANITY_DATASET:-production}
        NEXT_PUBLIC_SANITY_API_VERSION: ${NEXT_PUBLIC_SANITY_API_VERSION:-2025-06-04}
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
